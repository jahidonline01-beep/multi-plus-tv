<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Multi Plus TV Premium</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--pink:#ff61df;--violet:#8c5cff;--blue:#59c1ff;--gold:#ffd871;--soft:#edf2ff}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:Segoe UI,Arial,sans-serif}
body{background:radial-gradient(circle at 18% 0%,rgba(89,193,255,.15),transparent 24%),radial-gradient(circle at 100% 10%,rgba(255,97,223,.12),transparent 28%),radial-gradient(circle at 50% 100%,rgba(140,92,255,.11),transparent 30%),linear-gradient(180deg,#05020a 0%,#080510 58%,#020206 100%)}
.app-shell{height:100dvh;display:flex;flex-direction:column;overflow:hidden}

.header-wrap{flex:0 0 auto;padding:6px 8px 4px}
.header{position:relative;display:grid;grid-template-columns:1.2fr .9fr;align-items:center;gap:10px;padding:8px 12px;min-height:54px;border-radius:16px;background:linear-gradient(135deg,rgba(14,9,27,.98),rgba(10,7,20,.98));border:1px solid rgba(255,255,255,.08);box-shadow:0 0 12px rgba(140,92,255,.11),0 0 12px rgba(255,97,223,.08);overflow:hidden}
.header::before{content:"";position:absolute;inset:0;padding:1px;border-radius:16px;background:linear-gradient(90deg,rgba(89,193,255,.96),rgba(140,92,255,.96),rgba(255,97,223,.96),rgba(255,216,113,.84));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.header::after{content:"";position:absolute;inset:7px;border-radius:50%;background:radial-gradient(circle at 15% 50%,rgba(89,193,255,.11),transparent 24%),radial-gradient(circle at 85% 50%,rgba(255,97,223,.10),transparent 26%),linear-gradient(90deg,rgba(255,255,255,.025),rgba(255,255,255,.01));pointer-events:none}
.header-left,.header-right{position:relative;z-index:1}
.header-left{display:flex;justify-content:flex-start;align-items:center;min-width:0}
.header-left h1{font-size:clamp(16px,4.8vw,24px);line-height:1;font-weight:900;letter-spacing:.14px;background:linear-gradient(90deg,#ffcf58 0%,#ff9154 15%,#ff6dde 32%,#ca87ff 48%,#90a7ff 67%,#4cccff 83%,#92fff5 100%);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 1px 10px rgba(0,0,0,.36);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-right{display:flex;flex-direction:column;justify-content:center;align-items:flex-end;text-align:right}
.header-right .premium{font-size:8px;letter-spacing:3px;color:var(--gold);font-weight:800;line-height:1.1}
.header-right .tagline{margin-top:2px;font-size:5.8px;letter-spacing:1.4px;color:#eef2ff;opacity:.9;line-height:1.15}

.player-wrap{flex:0 0 auto;padding:0 8px 4px}
.player-shell{position:relative;border-radius:18px;overflow:hidden;background:#000;border:1px solid rgba(255,255,255,.08);box-shadow:0 0 12px rgba(89,193,255,.08),0 0 12px rgba(255,97,223,.07)}
.player-shell::before{content:"";position:absolute;inset:0;padding:1px;border-radius:18px;background:linear-gradient(135deg,rgba(89,193,255,.72),rgba(255,97,223,.70));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.video-stage{position:relative;background:#06142d;overflow:hidden}
.video-clean-cover{position:absolute;inset:0;z-index:9;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#071b42,#031026);opacity:0;pointer-events:none;transition:opacity .06s ease}
.video-clean-cover.show{opacity:1}
.video-clean-cover .cover-loader{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:16px;background:linear-gradient(135deg,rgba(8,31,78,.88),rgba(4,15,42,.86));border:1px solid rgba(110,190,255,.18);box-shadow:0 6px 14px rgba(0,0,0,.16);transform-style:preserve-3d;backdrop-filter:blur(6px)}
.video-clean-cover .cover-title{font-size:11px;font-weight:900;letter-spacing:1.1px;color:#ecf9ff;text-shadow:0 0 8px rgba(89,193,255,.14)}
.video-clean-cover .cover-sub{font-size:9px;color:#bfdfff;opacity:.94;letter-spacing:.5px;white-space:nowrap}
video{display:block;width:100%;height:205px;object-fit:contain;background:#000}
.center-play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:58px;height:58px;border-radius:50%;border:0;background:rgba(255,255,255,.94);color:#111;font-size:21px;display:grid;place-items:center;z-index:6;box-shadow:0 0 14px rgba(255,255,255,.16);transition:opacity .18s}
.center-play.playing{opacity:0;pointer-events:none}
.player-shell.switching .center-play{opacity:0!important;pointer-events:none!important}
.player-shell.switching video{opacity:0!important;visibility:hidden!important}
.player-shell.switching .switch-overlay{pointer-events:auto}
.switch-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .08s ease;z-index:7;background:linear-gradient(180deg,#071735,#031026)}
.switch-overlay.show{opacity:1}
.switch-box{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:16px;background:linear-gradient(135deg,rgba(8,31,78,.88),rgba(4,15,42,.86));border:1px solid rgba(110,190,255,.18);box-shadow:0 6px 14px rgba(0,0,0,.16);transform-style:preserve-3d;backdrop-filter:blur(6px)}
.switch-3d{position:relative;width:48px;height:34px;perspective:700px;flex:0 0 auto}
.switch-3d .ring{position:absolute;left:7px;top:2px;width:30px;height:30px;border-radius:50%;border:3px solid rgba(255,255,255,.16);border-top-color:#67d8ff;border-right-color:#ff6ce0;filter:drop-shadow(0 0 8px rgba(140,92,255,.24));animation:spin3d 1s linear infinite}
.switch-3d .ring::after{content:"";position:absolute;inset:6px;border-radius:50%;border:2px solid rgba(255,255,255,.12);border-left-color:#ffd871;border-bottom-color:#8c5cff;animation:spin3dRev .72s linear infinite}
.switch-3d .play-core{position:absolute;left:14px;top:9px;width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#59c1ff,#8c5cff,#ff61df);box-shadow:0 0 12px rgba(255,97,223,.22);display:flex;align-items:center;justify-content:center;transform:translateZ(18px)}
.switch-3d .play-core::after{content:"";margin-left:1px;border-left:7px solid #fff;border-top:4px solid transparent;border-bottom:4px solid transparent}
.switch-3d .dot{position:absolute;bottom:0;width:5px;height:5px;border-radius:50%;background:linear-gradient(135deg,#fff,#a6e7ff);box-shadow:0 0 8px rgba(255,255,255,.18);animation:bob 1s ease-in-out infinite}
.switch-3d .dot.d1{left:4px;animation-delay:0s}.switch-3d .dot.d2{left:14px;animation-delay:.12s}.switch-3d .dot.d3{left:24px;animation-delay:.24s}.switch-3d .dot.d4{left:34px;animation-delay:.36s}
.switch-texts{display:flex;flex-direction:column;gap:2px;min-width:0}
.switch-title{font-size:11px;font-weight:900;letter-spacing:1.2px;white-space:nowrap;background:linear-gradient(90deg,#59c1ff,#ff61df,#ffd871);-webkit-background-clip:text;background-clip:text;color:transparent}
.switch-sub{font-size:8.5px;font-weight:700;letter-spacing:.7px;color:#eef2ff;opacity:.88;white-space:nowrap}
@keyframes spin3d{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spin3dRev{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
@keyframes bob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.08)}}
.gesture-feedback{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);z-index:12;padding:10px 16px;border-radius:16px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(8px);font-size:13px;font-weight:900;color:#fff;opacity:0;pointer-events:none;transition:opacity .18s;box-shadow:0 0 16px rgba(140,92,255,.18)}
.gesture-feedback.show{opacity:1}
.screen-dimmer{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;z-index:2;transition:opacity .08s}
.btn.muted{background:linear-gradient(135deg,rgba(90,20,45,.98),rgba(30,10,25,.98));box-shadow:0 0 10px rgba(255,95,120,.25),inset 0 1px 0 rgba(255,255,255,.05);color:#ffd7df}
.player-bar{position:relative;padding:9px 8px 9px;background:linear-gradient(180deg,rgba(7,5,11,.90),rgba(10,7,16,.98));border-top:1px solid rgba(255,255,255,.06)}
.player-bar::before{content:"";position:absolute;left:10px;right:10px;top:0;height:2px;border-radius:999px;background:linear-gradient(90deg,rgba(89,193,255,.10),rgba(89,193,255,.92),rgba(140,92,255,.92),rgba(255,97,223,.88),rgba(255,216,113,.24));box-shadow:0 0 10px rgba(89,193,255,.16),0 0 10px rgba(255,97,223,.10)}
.time-row,.fs-time{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;color:#fff}
#seekBar,#fsSeekBar{width:100%;accent-color:#ff4ada;margin:5px 0 6px}
.control-row{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding:6px 0 2px;scrollbar-width:none}.control-row::-webkit-scrollbar{display:none}
.btn,.quality-chip,.fs-btn,.fs-quality-chip,.fs-channel-chip{border:0;background:linear-gradient(135deg,rgba(26,18,42,.98),rgba(11,8,20,.98));border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:12px;font-size:11px;font-weight:800;padding:7px 10px;line-height:1;white-space:nowrap;box-shadow:0 0 8px rgba(140,92,255,.11), inset 0 1px 0 rgba(255,255,255,.05)}
.btn.icon{min-width:36px;padding:8px 9px}
#volumeBar{width:62px;accent-color:#fff;flex:0 0 auto}
.quality-pack,.fs-quality-pack{display:flex;gap:6px;flex-wrap:nowrap;flex:0 0 auto}
.quality-chip.active,.fs-quality-chip.active{background:linear-gradient(135deg,#8c5cff,#ff61df);box-shadow:0 0 10px rgba(255,97,223,.24)}

.search-wrap{flex:0 0 auto;padding:0 8px 4px}
.search-frame{border-radius:12px;padding:1px;background:linear-gradient(90deg,rgba(89,193,255,.95),rgba(140,92,255,.95),rgba(255,97,223,.95));box-shadow:0 0 8px rgba(140,92,255,.10)}
.search-inner{height:32px;border-radius:11px;background:linear-gradient(180deg,#0d0915,#080610);display:flex;align-items:center;padding:0 10px}
.search-icon,.search-tools{font-size:14px;color:#fff;opacity:.88}.search-icon{margin-right:6px}.search-tools{margin-left:6px}
#search{flex:1;height:100%;border:0;outline:0;background:transparent;color:#fff;font-size:13px}#search::placeholder{color:#ccd1e8}

.channels-wrap{flex:1 1 auto;min-height:0;overflow-y:auto;padding:0 8px 10px;scrollbar-width:thin;scrollbar-color:#8c5cff #130f19}.channels-wrap::-webkit-scrollbar{width:6px}.channels-wrap::-webkit-scrollbar-thumb{background:#8c5cff;border-radius:10px}
.channel-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.channel-card{position:relative;background:linear-gradient(180deg,rgba(18,45,115,.62),rgba(12,31,88,.68) 52%,rgba(8,19,62,.74));border-radius:15px;padding:6px 5px;border:1px solid rgba(126,192,255,.16);cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 4px 10px rgba(5,18,56,.16)}
.channel-card::before{content:"";position:absolute;inset:0;padding:1px;border-radius:15px;background:linear-gradient(135deg,rgba(82,161,255,.42),rgba(53,114,230,.34),rgba(128,212,255,.28));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.channel-thumb{position:relative;width:74px;height:74px;margin:0 auto;border-radius:50%;background:linear-gradient(180deg,rgba(36,88,220,.56),rgba(16,52,156,.52) 50%,rgba(8,28,102,.58));display:flex;align-items:center;justify-content:center;padding:10px;overflow:visible;border:1px solid rgba(160,214,255,.24);backdrop-filter:blur(12px);box-shadow:inset 0 1px 0 rgba(255,255,255,.12), inset 0 -12px 18px rgba(4,14,62,.28), 0 6px 12px rgba(6,18,60,.20)}.channel-thumb img{width:100%;height:100%;object-fit:contain;border-radius:50%}.fallback{font-size:11px;font-weight:800;color:#eef2ff;text-align:center;line-height:1.15}
.channel-name{margin-top:5px;font-size:10px;line-height:1.15;text-align:center;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:22px}
.channel-card.active{box-shadow:inset 0 0 0 1px rgba(140,214,255,.22),0 4px 10px rgba(5,18,56,.16)}
.channel-card.active .channel-thumb{box-shadow:0 0 0 2px rgba(196,236,255,.22), inset 0 1px 0 rgba(255,255,255,.14), 0 0 0 3px rgba(64,126,255,.20)}
.channel-card.active .channel-thumb::after{content:"";position:absolute;inset:-3px;border-radius:50%;padding:2px;background:linear-gradient(135deg,#69d5ff,#5f95ff,#8ec9ff);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:.95}
.channel-card.active .channel-thumb::before{content:"";position:absolute;right:6px;top:6px;width:13px;height:13px;border-radius:50%;background:#7dff95;box-shadow:0 0 0 3px rgba(10,12,18,.52),0 0 14px rgba(125,255,149,.95),0 0 22px rgba(125,255,149,.45);z-index:2}
.telegram{display:block;text-decoration:none;text-align:center;color:#fff;background:linear-gradient(135deg,#0088cc,#00b3ff,#8c5cff);padding:9px 12px;border-radius:12px;margin:10px 0 5px;font-size:13px;font-weight:800;box-shadow:0 0 10px rgba(0,179,255,.14)}
.footer{text-align:center;color:#d8dcef;font-size:12px;padding:4px 0 0}.footer span{color:var(--gold)}
.time-row,.fs-time,#seekBar,#fsSeekBar{display:none!important}
.player-bar{padding-top:10px!important}
.fs-overlay{padding-top:0!important}

.fs-overlay{display:none;position:absolute;left:0;right:0;bottom:0;z-index:9;padding:10px 12px;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,.16),rgba(0,0,0,.88));backdrop-filter:none}
.fs-layout{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px}
.fs-left,.fs-center,.fs-right{display:flex;align-items:center;gap:8px;min-width:0}
.fs-left{justify-content:flex-start}
.fs-center{justify-content:center}
.fs-right{justify-content:flex-end}
.fs-btn{font-size:12px;padding:8px 12px;border-radius:14px}
.fs-btn.nav{font-size:13px;padding:10px 16px;min-width:70px;background:linear-gradient(135deg,rgba(39,27,65,.98),rgba(12,8,21,.98));box-shadow:0 0 12px rgba(140,92,255,.18), inset 0 1px 0 rgba(255,255,255,.05)}
.fs-btn.play{min-width:50px;padding:10px 12px;font-size:15px;background:linear-gradient(135deg,rgba(47,33,78,.98),rgba(14,10,24,.98))}
.fs-btn.restore{padding:10px 16px;background:linear-gradient(135deg,rgba(46,34,72,.98),rgba(16,11,28,.98))}
.fs-channel-strip{margin-top:8px;display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}.fs-channel-strip::-webkit-scrollbar{display:none}
.fs-channel-chip{padding:5px 9px;border-radius:999px;font-size:10px;flex:0 0 auto;background:linear-gradient(135deg,rgba(22,16,36,.96),rgba(8,7,16,.96));display:flex;align-items:center;gap:6px;max-width:140px}
.fs-channel-chip img{width:24px;height:24px;border-radius:50%;object-fit:contain;background:#fff;padding:2px;flex:0 0 24px}
.fs-channel-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.fs-channel-chip.active{background:linear-gradient(135deg,#8c5cff,#ff61df);box-shadow:0 0 10px rgba(255,97,223,.22)}

.player-shell.fullscreen-mode,.player-shell.pseudo-fullscreen{position:fixed;inset:0;width:100vw;height:100dvh;z-index:9999;border-radius:0;background:#000}
.player-shell.fullscreen-mode::before,.player-shell.pseudo-fullscreen::before{display:none}
.player-shell.fullscreen-mode video,.player-shell.pseudo-fullscreen video{height:100dvh;width:100vw;object-fit:contain;background:#000}
.player-shell.fullscreen-mode .player-bar,.player-shell.pseudo-fullscreen .player-bar{display:none}
.player-shell.fullscreen-mode .fs-overlay,.player-shell.pseudo-fullscreen .fs-overlay{display:block}
.player-shell.hidden-ui .fs-overlay{opacity:0;pointer-events:none;transition:opacity .2s}

@media (max-width:720px){
  .header-left h1{font-size:clamp(15px,5vw,22px)}
  video{height:194px}
  .channel-thumb{width:66px;height:66px;padding:9px}
  .channel-name{font-size:9.5px;min-height:20px}
  .fs-btn.nav{min-width:62px;padding:9px 12px}
  .fs-layout{gap:6px}
  .header-right .premium{font-size:7px;letter-spacing:2.6px}
  .header-right .tagline{font-size:5.3px;letter-spacing:1.2px}
}
</style>
</head>
<body>
<div class="app-shell">
  <div class="header-wrap">
    <div class="header">
      <div class="header-left"><h1>Multi Plus TV</h1></div>
      <div class="header-right">
        <div class="premium">PREMIUM</div>
        <div class="tagline">LIVE CHANNEL STREAMING</div>
      </div>
    </div>
  </div>

  <div class="player-wrap">
    <div class="player-shell" id="playerShell">
      <div class="video-stage" id="videoStage">
        <video id="video" playsinline webkit-playsinline autoplay></video>
        <div class="video-clean-cover" id="videoCleanCover"><div class="cover-loader"><div class="switch-3d"><div class="ring"></div><div class="play-core"></div><div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div><div class="dot d4"></div></div><div class="switch-texts"><div class="cover-title">LOADING CHANNEL</div><div class="cover-sub">Optimizing stream and picture</div></div></div></div>
        <div class="screen-dimmer" id="screenDimmer"></div>
        <button class="center-play" id="centerPlay" onclick="togglePlay(event)">▶</button>
        <div class="gesture-feedback" id="gestureFeedback"></div>
        <div class="switch-overlay" id="switchOverlay"><div class="switch-box"><div class="switch-3d"><div class="ring"></div><div class="play-core"></div><div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div><div class="dot d4"></div></div><div class="switch-texts"><div class="switch-title">LOADING CHANNEL</div><div class="switch-sub">Optimizing stream and picture</div></div></div></div>
        <div class="fs-overlay" id="fsOverlay">
          <div class="fs-time"><span id="fsCurrentTime">0:00</span><span id="fsDurationTime">0:00</span></div>
          <input type="range" id="fsSeekBar" min="0" max="100" value="0">
          <div class="fs-layout">
            <div class="fs-left">
              <button class="fs-btn nav" onclick="prevChannel(event)">Prev</button>
              <div class="fs-quality-pack" id="fsQualityPack"></div>
            </div>
            <div class="fs-center">
              <button class="fs-btn play" onclick="togglePlay(event)">⏯</button>
            </div>
            <div class="fs-right">
              <button class="fs-btn nav" onclick="nextChannel(event)">Next</button>
              <button class="fs-btn restore" id="fsMiniToggle" onclick="toggleFullscreen(event)">Restore</button>
            </div>
          </div>
          <div class="fs-channel-strip" id="fsChannelStrip"></div>
        </div>
      </div>
      <div class="player-bar" id="playerBar">
        <div class="time-row"><span id="currentTime">0:00</span><span id="durationTime">0:00</span></div>
        <input type="range" id="seekBar" min="0" max="100" value="0">
        <div class="control-row">
          <button class="btn icon" onclick="togglePlay(event)">⏯</button>
          <button class="btn icon" id="muteBtn" onclick="toggleMute(event)">🔊</button>
          <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="1">
          <button class="btn" onclick="prevChannel(event)">Prev</button>
          <button class="btn" onclick="nextChannel(event)">Next</button>
          <div class="quality-pack" id="qualityPack"></div>
          <button class="btn" id="fsToggle" onclick="toggleFullscreen(event)">Fullscreen</button>
        </div>
      </div>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-frame">
      <div class="search-inner">
        <div class="search-icon">⌕</div>
        <input id="search" type="text" placeholder="Search Channel..." oninput="renderChannels()">
        <div class="search-tools">⚙</div>
      </div>
    </div>
  </div>

  <div class="channels-wrap">
    <div class="channel-grid" id="channelGrid"></div>
    <a class="telegram" href="https://t.me/JAHID_1" target="_blank" rel="noopener">Telegram</a>
    <div class="footer">Powered by <span>Multi Plus TV Premium</span></div>
  </div>
</div>
<script>
const playlist = 'https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/aynaott.m3u';
const state = { channels: [], filtered: [], currentIndex: 0, currentFilteredIndex: 0, hls: null, qualityMode: 'auto', hideTimer: null, switchToken: 0, currentUrl: '', isSwitchLoading: false, switchStartedAt: 0, switchRetryTimer: null, switchWatchdogTimer: null, userPaused: false, userMuted: false, pendingOverlayTimer: null };
const video = document.getElementById('video');
const videoCleanCover = document.getElementById('videoCleanCover');
const playerShell = document.getElementById('playerShell');
const qualityPack = document.getElementById('qualityPack');
const fsQualityPack = document.getElementById('fsQualityPack');
const fsChannelStrip = document.getElementById('fsChannelStrip');
const seekBar = document.getElementById('seekBar');
const fsSeekBar = document.getElementById('fsSeekBar');
const volumeBar = document.getElementById('volumeBar');
const centerPlay = document.getElementById('centerPlay');
const muteBtn = document.getElementById('muteBtn');
const gestureFeedback = document.getElementById('gestureFeedback');
const screenDimmer = document.getElementById('screenDimmer');
let volumeLevel = 1;
const fsOverlay = document.getElementById('fsOverlay');
let brightnessLevel = 0.8;
let gestureStart = null;
let lastTap = 0;
const videoStage = document.getElementById('videoStage');
const fsToggle = document.getElementById('fsToggle');
const fsMiniToggle = document.getElementById('fsMiniToggle');
const switchOverlay = document.getElementById('switchOverlay');

fetch(playlist).then(r => r.text()).then(text => {
  state.channels = parseM3U(text);
  renderChannels();
  if (state.filtered.length) playFilteredIndex(0);
}).catch(() => {});

function parseM3U(text) {
  const lines = text.split(/\r?\n/); const out = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line.startsWith('#EXTINF')) continue;
    const name = (line.split(',').pop() || 'Channel').trim();
    const m = line.match(/tvg-logo="(.*?)"/i); const logo = m ? m[1] : '';
    let url = '';
    for (let j = i + 1; j < lines.length; j++) {
      const nxt = lines[j].trim();
      if (!nxt || nxt.startsWith('#')) continue;
      url = nxt; i = j; break;
    }
    if (url) out.push({ name, logo, url });
  }
  return out;
}

function renderChannels() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  state.filtered = state.channels.filter(ch => ch.name.toLowerCase().includes(q));
  const grid = document.getElementById('channelGrid');
  grid.innerHTML = '';
  if (!state.filtered.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;padding:28px 10px;text-align:center;opacity:.85">No channels found</div>';
    fsChannelStrip.innerHTML = '';
    return;
  }
  state.filtered.forEach((ch, idx) => {
    const originalIndex = state.channels.indexOf(ch);
    const card = document.createElement('div');
    card.className = 'channel-card' + (originalIndex === state.currentIndex ? ' active' : '');
    const thumb = ch.logo
      ? `<div class="channel-thumb"><img src="${escapeHtml(ch.logo)}" alt="${escapeHtml(ch.name)}" onerror="this.parentNode.innerHTML='<div class=\\'fallback\\'>${escapeHtml(ch.name)}</div>'"></div>`
      : `<div class="channel-thumb"><div class="fallback">${escapeHtml(ch.name)}</div></div>`;
    card.innerHTML = `${thumb}<div class="channel-name">${escapeHtml(ch.name)}</div>`;
    card.onclick = () => playFilteredIndex(idx);
    grid.appendChild(card);
  });
  renderFsChannelStrip();
}

function renderFsChannelStrip() {
  fsChannelStrip.innerHTML = '';
  state.filtered.forEach((ch, idx) => {
    const chip = document.createElement('button');
    chip.className = 'fs-channel-chip' + (idx === state.currentFilteredIndex ? ' active' : '');
    if (ch.logo) {
      const img = document.createElement('img');
      img.src = ch.logo;
      img.alt = ch.name;
      img.onerror = () => img.remove();
      chip.appendChild(img);
    }
    const span = document.createElement('span');
    span.textContent = ch.name;
    chip.appendChild(span);
    chip.onclick = (e) => { e.stopPropagation(); playFilteredIndex(idx); if (isFullscreenLike()) showControlsTemporarily(); };
    fsChannelStrip.appendChild(chip);
  });
  updateActiveChannelUI();
}

function playFilteredIndex(idx) {
  const channel = state.filtered[idx];
  if (!channel) return;
  state.currentFilteredIndex = idx;
  state.currentIndex = state.channels.indexOf(channel);
  updateActiveChannelUI();
  state.pendingChannel = channel;
  clearTimeout(state.pendingSwitchTimer);
  showVideoCover('LOADING CHANNEL');
  showSwitchOverlay(true);
  state.pendingSwitchTimer = setTimeout(() => {
    if (state.pendingChannel === channel) loadChannel(channel);
  }, 220);
}

function updateActiveChannelUI() {
  document.querySelectorAll('#channelGrid .channel-card').forEach((card, idx) => {
    card.classList.toggle('active', idx === state.currentFilteredIndex);
  });
  document.querySelectorAll('#fsChannelStrip .fs-channel-chip').forEach((chip, idx) => {
    chip.classList.toggle('active', idx === state.currentFilteredIndex);
  });
  const activeChip = document.querySelector('#fsChannelStrip .fs-channel-chip.active');
  if (activeChip && isFullscreenLike()) activeChip.scrollIntoView({ inline: 'center', behavior: 'auto', block: 'nearest' });
}


function showVideoCover(label = 'LOADING CHANNEL') {
  clearTimeout(state.videoCoverTimer);
  if (videoCleanCover) {
    const title = videoCleanCover.querySelector('.cover-title');
    if (title && label) title.textContent = label;
    videoCleanCover.classList.add('show');
  }
}
function hideVideoCover(delay = 80) {
  clearTimeout(state.videoCoverTimer);
  state.videoCoverTimer = setTimeout(() => {
    if (videoCleanCover) videoCleanCover.classList.remove('show');
  }, delay);
}

function showSwitchOverlay(force = false) {
  showVideoCover('LOADING CHANNEL');
  state.isSwitchLoading = true;
  state.switchStartedAt = state.switchStartedAt || Date.now();
  clearTimeout(showSwitchOverlay.t);
  clearTimeout(state.pendingOverlayTimer);
  clearTimeout(state.switchRetryTimer);
  clearTimeout(state.switchWatchdogTimer);
  const reveal = () => {
    if (!state.isSwitchLoading) return;
    playerShell.classList.add('switching');
    if (switchOverlay) switchOverlay.classList.add('show');
  };
  if (force) reveal();
  else state.pendingOverlayTimer = setTimeout(reveal, 550);
}

function hideSwitchOverlay(force = false) {
  if (!force) {
    const minVisible = 60;
    const elapsed = Date.now() - (state.switchStartedAt || 0);
    if (elapsed < minVisible) {
      clearTimeout(showSwitchOverlay.t);
      showSwitchOverlay.t = setTimeout(() => hideSwitchOverlay(true), minVisible - elapsed);
      return;
    }
  }
  state.isSwitchLoading = false;
  state.switchStartedAt = 0;
  clearTimeout(state.pendingOverlayTimer);
  clearTimeout(state.switchRetryTimer);
  clearTimeout(state.switchWatchdogTimer);
  playerShell.classList.remove('switching');
  if (switchOverlay) switchOverlay.classList.remove('show');
  hideVideoCover(90);
}

function hasVisibleVideo() {
  return (video.videoWidth || 0) > 0 && (video.videoHeight || 0) > 0;
}

function maybeHideSwitchOverlay() {
  if (!state.isSwitchLoading) return;
  if (hasVisibleVideo() && video.readyState >= 3 && !video.paused && (video.currentTime > 0.08 || video.videoWidth > 0)) {
    try { video.style.opacity = '1'; } catch(e) {}
    hideSwitchOverlay();
  }
}

function forceQualityRecovery(attempts) {
  if (!state.hls) return;
  const levels = dedupeLevels(state.hls.levels || []);
  try {
    if (!levels.length || attempts === 1) {
      state.hls.currentLevel = -1;
      state.hls.nextLevel = -1;
      state.hls.loadLevel = -1;
      state.qualityMode = 'auto';
      applyQuality('auto');
      return;
    }
    const order = [];
    if (levels[0]) order.push(levels[0]);
    if (levels[1]) order.push(levels[1]);
    if (levels.length > 2) order.push(levels[Math.floor(levels.length / 2)]);
    for (let i = levels.length - 1; i >= 0; i--) order.push(levels[i]);
    const target = order[Math.min(order.length - 1, Math.max(0, attempts - 2))];
    if (target) {
      state.hls.currentLevel = target.index;
      state.hls.nextLevel = target.index;
      state.hls.loadLevel = target.index;
      state.qualityMode = String(target.index);
      applyQuality(String(target.index));
    }
  } catch (e) {}
}

function scheduleSwitchRecovery(channel, switchToken, tryPlay, fallbackNative) {
  let attempts = 0;
  let hardReloadUsed = false;
  let nativeFallbackUsed = false;

  const hardReloadHls = () => {
    if (hardReloadUsed || switchToken !== state.switchToken) return;
    hardReloadUsed = true;
    try { destroyHls(); } catch (e) {}
    try { video.pause(); } catch (e) {}
    showSwitchOverlay(true); showVideoCover('LOADING CHANNEL'); try { video.style.opacity='0.01'; video.removeAttribute('src'); video.load(); } catch (e) {}
    setTimeout(() => {
      if (switchToken === state.switchToken) loadChannel(channel);
    }, 120);
  };

  const step = () => {
    if (switchToken !== state.switchToken || !state.isSwitchLoading) return;
    attempts += 1;

    const audioMovingNoPicture = !hasVisibleVideo() && (video.currentTime > 0.04 || video.readyState >= 2);
    const visiblePlaying = hasVisibleVideo() && video.readyState >= 3 && !video.paused && (video.currentTime > 0.08 || video.videoWidth > 0);

    if (visiblePlaying) {
      hideSwitchOverlay();
      return;
    }

    try {
      showSwitchOverlay(true);

      if (state.hls) {
        if (audioMovingNoPicture || attempts >= 1) forceQualityRecovery(attempts);

        try { state.hls.stopLoad(); } catch (e) {}
        setTimeout(() => { try { if (state.hls) state.hls.startLoad(-1); } catch (e) {} }, 60);

        if (audioMovingNoPicture || attempts >= 2) {
          try { state.hls.swapAudioCodec && state.hls.swapAudioCodec(); } catch (e) {}
          try { state.hls.recoverMediaError(); } catch (e) {}
          tryPlay();
        }

        if (attempts >= 3) {
          try { video.currentTime = Math.max(0, video.currentTime + 0.001); } catch (e) {}
          tryPlay();
        }

        if (attempts >= 4) {
          try {
            state.hls.detachMedia();
            state.hls.attachMedia(video);
            state.hls.loadSource(channel.url);
            state.hls.startLoad(-1);
          } catch (e) {}
          tryPlay();
        }

        if (attempts >= 5 && !nativeFallbackUsed && typeof fallbackNative === 'function') {
          nativeFallbackUsed = true;
          fallbackNative();
        }

        if (attempts >= 7) {
          hardReloadHls();
          return;
        }
      } else {
        tryPlay();
        if (attempts >= 2) {
          try { video.load(); } catch (e) {}
          tryPlay();
        }
      }
    } catch (e) {}

    if (attempts < 10) state.switchRetryTimer = setTimeout(step, attempts < 3 ? 1500 : 2200);
  };

  state.switchRetryTimer = setTimeout(step, 1400);
  state.switchWatchdogTimer = setTimeout(() => {
    if (switchToken === state.switchToken && state.isSwitchLoading) hideSwitchOverlay(true);
  }, 30000);
}

function loadChannel(channel) {
  clearTimeout(state.pendingSwitchTimer);
  showVideoCover('LOADING CHANNEL');
  const switchToken = ++state.switchToken;
  state.switchStartedAt = Date.now();
  showSwitchOverlay(true);
  state.currentUrl = channel.url;
  destroyHls();
  buildQualityButtons([]);
  try { video.style.opacity = '0.01'; } catch(e) {}
  video.autoplay = true;
  video.preload = 'auto';
  video.muted = state.userMuted || volumeLevel === 0;

  const tryPlay = () => {
    if (switchToken !== state.switchToken || state.userPaused) return;
    video.muted = state.userMuted || volumeLevel === 0;
    const p = video.play();
    if (p && typeof p.catch === 'function') {
      p.catch(() => setTimeout(() => {
        if (switchToken === state.switchToken && !state.userPaused) {
          video.muted = state.userMuted || volumeLevel === 0;
          video.play().catch(() => {});
        }
      }, 180));
    }
  };

  const fallbackNative = () => {
    if (switchToken !== state.switchToken) return;
    destroyHls();
    video.autoplay = true;
    video.preload = 'auto';
    showSwitchOverlay(true);
    showVideoCover('LOADING CHANNEL'); try { video.style.opacity='0.01'; } catch(e) {}
    video.src = channel.url;
    video.addEventListener('loadeddata', tryPlay, { once: true });
    video.addEventListener('canplay', tryPlay, { once: true });
    video.load();
  };

  const applyBestQualityAndPlay = () => {
    if (switchToken !== state.switchToken) return;
    const levels = dedupeLevels(state.hls ? (state.hls.levels || []) : []);
    buildQualityButtons(levels);
    state.qualityMode = 'auto';
    applyQuality('auto');
    tryPlay();
  };

  if (window.Hls && Hls.isSupported()) {
    state.hls = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
      capLevelToPlayerSize: true,
      startLevel: 0,
      autoStartLoad: true,
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      abrEwmaDefaultEstimate: 5000000,
      backBufferLength: 8,
      maxBufferHole: 0.8,
      nudgeOffset: 0.1,
      nudgeMaxRetry: 10,
      manifestLoadingTimeOut: 10000,
      fragLoadingTimeOut: 25000,
      levelLoadingTimeOut: 12000,
      manifestLoadingMaxRetry: 2,
      levelLoadingMaxRetry: 2,
      fragLoadingMaxRetry: 3,
      liveDurationInfinity: true
    });
    state.hls.attachMedia(video);
    state.hls.on(Hls.Events.MEDIA_ATTACHED, () => {
      if (switchToken !== state.switchToken) return;
      state.hls.loadSource(channel.url);
      state.hls.startLoad();
    });
    state.hls.on(Hls.Events.MANIFEST_PARSED, applyBestQualityAndPlay);
    state.hls.on(Hls.Events.LEVEL_LOADED, () => { if (switchToken === state.switchToken) tryPlay(); });
    state.hls.on(Hls.Events.LEVEL_SWITCHED, () => { if (switchToken === state.switchToken) tryPlay(); });
    state.hls.on(Hls.Events.FRAG_BUFFERED, () => { if (switchToken === state.switchToken) maybeHideSwitchOverlay(); });
    state.hls.on(Hls.Events.FRAG_LOADED, () => { if (switchToken === state.switchToken) tryPlay(); });
    state.hls.on(Hls.Events.FPS_DROP, () => { if (switchToken === state.switchToken) { forceQualityRecovery(2); tryPlay(); } });
    state.hls.on(Hls.Events.FPS_DROP_LEVEL_CAPPING, () => { if (switchToken === state.switchToken) { forceQualityRecovery(2); tryPlay(); } });
    state.hls.on(Hls.Events.ERROR, (_event, data) => {
      if (switchToken !== state.switchToken) return;
      if (data && data.fatal) {
        try {
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) { state.hls.stopLoad(); state.hls.startLoad(-1); }
          else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) { forceQualityRecovery(2); try { state.hls.swapAudioCodec && state.hls.swapAudioCodec(); } catch(e) {} state.hls.recoverMediaError(); tryPlay(); }
          else fallbackNative();
        } catch(e) {}
      }
    });
  } else {
    video.autoplay = true;
    video.preload = 'auto';
    showSwitchOverlay(true);
    showVideoCover('LOADING CHANNEL'); try { video.style.opacity='0.01'; } catch(e) {}
    video.src = channel.url;
    video.addEventListener('loadeddata', tryPlay, { once: true });
    video.addEventListener('canplay', tryPlay, { once: true });
    video.load();
  }
  scheduleSwitchRecovery(channel, switchToken, tryPlay, fallbackNative);
  updateActiveChannelUI();
  updateMuteUI();
  if (isFullscreenLike()) showControlsTemporarily();
}

function destroyHls() { if (state.hls) { try { state.hls.destroy(); } catch(e) {} state.hls = null; } }
function dedupeLevels(levels) {
  const map = new Map();
  levels.forEach((lvl, i) => {
    const key = lvl.height || lvl.bitrate || i;
    if (!map.has(key)) map.set(key, { index: i, height: lvl.height || 0, bitrate: lvl.bitrate || 0 });
  });
  return [...map.values()].sort((a, b) => (a.height || a.bitrate) - (b.height || b.bitrate));
}
function makeBtn(label, value, cls) {
  const btn = document.createElement('button');
  btn.className = cls + (state.qualityMode === value ? ' active' : '');
  btn.textContent = label;
  btn.onclick = (e) => { e.stopPropagation(); applyQuality(value); if (isFullscreenLike()) showControlsTemporarily(); };
  return btn;
}
function buildQualityButtons(levels) {
  qualityPack.innerHTML = ''; fsQualityPack.innerHTML = '';
  const list = [{ label: 'Auto', value: 'auto' }];
  levels.forEach(l => list.push({ label: l.height ? `${l.height}p` : `${Math.round(l.bitrate / 1000)}k`, value: String(l.index) }));
  list.forEach(item => {
    qualityPack.appendChild(makeBtn(item.label, item.value, 'quality-chip'));
    fsQualityPack.appendChild(makeBtn(item.label, item.value, 'fs-quality-chip'));
  });
}
function applyQuality(value) {
  state.qualityMode = value;
  for (const pack of [qualityPack, fsQualityPack]) {
    [...pack.children].forEach(btn => btn.classList.remove('active'));
    [...pack.children].forEach(btn => {
      if ((value === 'auto' && btn.textContent === 'Auto') || labelMatchesValue(btn.textContent, value)) btn.classList.add('active');
    });
  }
  if (!state.hls) return;
  state.hls.currentLevel = value === 'auto' ? -1 : parseInt(value, 10);
}
function labelMatchesValue(label, value) {
  if (value === 'auto') return label === 'Auto';
  const levels = dedupeLevels(state.hls ? state.hls.levels || [] : []);
  const m = levels.find(l => String(l.index) === String(value));
  if (!m) return false;
  return label === (m.height ? `${m.height}p` : `${Math.round(m.bitrate / 1000)}k`);
}

function nextChannel(e){ if(e) e.stopPropagation(); if(!state.filtered.length) return; state.currentFilteredIndex=(state.currentFilteredIndex+1)%state.filtered.length; playFilteredIndex(state.currentFilteredIndex); }
function prevChannel(e){ if(e) e.stopPropagation(); if(!state.filtered.length) return; state.currentFilteredIndex=(state.currentFilteredIndex-1+state.filtered.length)%state.filtered.length; playFilteredIndex(state.currentFilteredIndex); }
function safePlay(){
  if(state.userPaused) return;
  video.muted = state.userMuted || volumeLevel === 0;
  video.play().catch(() => {});
}
function togglePlay(e){
  if(e) e.stopPropagation();
  if(video.paused){
    state.userPaused = false;
    safePlay();
  } else {
    state.userPaused = true;
    video.pause();
  }
  updateCenterPlay();
  if(isFullscreenLike()) showControlsTemporarily();
}
function setVolumeLevel(value){
  volumeLevel = clamp(Number(value) || 0, 0, 1);
  video.volume = volumeLevel;
  video.muted = state.userMuted || volumeLevel === 0;
  volumeBar.value = volumeLevel;
  updateMuteUI();
}
function toggleMute(e){
  if(e) e.stopPropagation();
  if(state.userMuted || video.muted || volumeLevel === 0){
    state.userMuted = false;
    if(volumeLevel === 0) volumeLevel = 1;
    video.volume = volumeLevel;
    video.muted = state.userMuted || volumeLevel === 0;
  } else {
    state.userMuted = true;
    video.muted = true;
  }
  volumeBar.value = volumeLevel;
  updateMuteUI();
  if(isFullscreenLike()) showControlsTemporarily();
}
function updateMuteUI(){ const muted = state.userMuted || video.muted || volumeLevel === 0; muteBtn.textContent = muted ? '🔇' : '🔊'; muteBtn.classList.toggle('muted', muted); }
function updateCenterPlay(){ centerPlay.textContent = video.paused ? '▶' : '❚❚'; centerPlay.classList.toggle('playing', !video.paused); }
function enterAndroidFullscreen(){ try{ if(window.AndroidBridge && AndroidBridge.enterFullscreen) AndroidBridge.enterFullscreen(); }catch(e){} }
function exitAndroidFullscreen(){ try{ if(window.AndroidBridge && AndroidBridge.exitFullscreen) AndroidBridge.exitFullscreen(); }catch(e){} }
function setAndroidBrightness(value){ try{ if(window.AndroidBridge && AndroidBridge.setBrightness) AndroidBridge.setBrightness(value); }catch(e){} }
function resetAndroidBrightness(){ try{ if(window.AndroidBridge && AndroidBridge.resetBrightness) AndroidBridge.resetBrightness(); }catch(e){} }
function setBrightnessLevel(value){
  brightnessLevel = clamp(Number(value) || 0.01, 0.01, 1);
  setAndroidBrightness(brightnessLevel);
  if(screenDimmer) screenDimmer.style.opacity = String((1 - brightnessLevel) * 0.78);
}
function setFsButtons(){ const on = isFullscreenLike(); fsToggle.textContent = on ? 'Restore' : 'Fullscreen'; fsMiniToggle.textContent = 'Restore'; }
function toggleFullscreen(e){
  if(e) e.stopPropagation();
  const entering = !isFullscreenLike();
  if(entering){
    enterAndroidFullscreen();
    if(playerShell.requestFullscreen) playerShell.requestFullscreen().catch(() => playerShell.classList.add('pseudo-fullscreen'));
    else playerShell.classList.add('pseudo-fullscreen');
    if(screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {});
    setTimeout(() => { playerShell.classList.add('fullscreen-mode'); playerShell.classList.remove('hidden-ui'); setFsButtons(); showControlsTemporarily(); renderFsChannelStrip(); }, 100);
  } else {
    if(document.fullscreenElement) document.exitFullscreen && document.exitFullscreen();
    playerShell.classList.remove('pseudo-fullscreen','fullscreen-mode','hidden-ui');
    if(screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
    exitAndroidFullscreen(); resetAndroidBrightness(); if(screenDimmer) screenDimmer.style.opacity='0'; clearTimeout(state.hideTimer); setFsButtons();
  }
}
function isFullscreenLike(){ return document.fullscreenElement===playerShell || playerShell.classList.contains('pseudo-fullscreen') || playerShell.classList.contains('fullscreen-mode'); }
function showControlsTemporarily(){ playerShell.classList.remove('hidden-ui'); clearTimeout(state.hideTimer); state.hideTimer=setTimeout(() => { if(isFullscreenLike()) playerShell.classList.add('hidden-ui'); }, 5000); }
function handlePlayerTap(e){ const actionable = e.target.closest('.center-play,.player-bar,.fs-overlay'); if(actionable) return; if(isFullscreenLike()){ const now = Date.now(); if(now - lastTap < 320){ playerShell.classList.add('hidden-ui'); clearTimeout(state.hideTimer); lastTap = 0; return; } lastTap = now; if(playerShell.classList.contains('hidden-ui')){ playerShell.classList.remove('hidden-ui'); showControlsTemporarily(); } else { showControlsTemporarily(); } } }
function formatTime(sec){ const n=Number(sec); if (!Number.isFinite(n)) return ''; const v=Math.max(0,n); const m=Math.floor(v/60), s=Math.floor(v%60); return `${m}:${String(s).padStart(2,'0')}`; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

video.addEventListener('stalled', () => { if (state.isSwitchLoading) showSwitchOverlay(); });
video.addEventListener('suspend', () => { if (state.isSwitchLoading) showSwitchOverlay(); });
video.addEventListener('error', () => { if (state.isSwitchLoading) showSwitchOverlay(); });
video.addEventListener('play', () => {
  if(state.userPaused){ video.pause(); return; }
  video.muted = state.userMuted || volumeLevel === 0;
  updateCenterPlay();
  maybeHideSwitchOverlay();
});
video.addEventListener('pause', () => { updateCenterPlay(); });
video.addEventListener('loadeddata', maybeHideSwitchOverlay);
video.addEventListener('loadedmetadata', maybeHideSwitchOverlay);
video.addEventListener('canplay', maybeHideSwitchOverlay);
video.addEventListener('canplaythrough', maybeHideSwitchOverlay);
video.addEventListener('playing', maybeHideSwitchOverlay);
video.addEventListener('resize', maybeHideSwitchOverlay);
video.addEventListener('waiting', () => { if (state.isSwitchLoading) showSwitchOverlay(true); });
video.addEventListener('loadedmetadata', () => { const d=formatTime(video.duration); document.getElementById('durationTime').textContent=d; document.getElementById('fsDurationTime').textContent=d; });
video.addEventListener('timeupdate', () => {
  const c=formatTime(video.currentTime) || '0:00', d=formatTime(video.duration);
  document.getElementById('currentTime').textContent=c; document.getElementById('durationTime').textContent=d;
  document.getElementById('fsCurrentTime').textContent=c; document.getElementById('fsDurationTime').textContent=d;
  if(Number.isFinite(video.duration) && video.duration > 0){ const v=(video.currentTime/video.duration)*100; seekBar.value=v; fsSeekBar.value=v; }
});
for(const sb of [seekBar, fsSeekBar]){
  sb.addEventListener('input', () => {
    if(Number.isFinite(video.duration) && video.duration > 0){ const v=sb.value; video.currentTime=(v/100)*video.duration; seekBar.value=v; fsSeekBar.value=v; }
    if(isFullscreenLike()) showControlsTemporarily();
  });
}
volumeBar.addEventListener('input', () => { setVolumeLevel(Number(volumeBar.value)); if(isFullscreenLike()) showControlsTemporarily(); });
videoStage.addEventListener('click', handlePlayerTap);
document.addEventListener('fullscreenchange', () => {
  if(document.fullscreenElement===playerShell){ playerShell.classList.add('fullscreen-mode'); setFsButtons(); showControlsTemporarily(); renderFsChannelStrip(); }
  else { playerShell.classList.remove('fullscreen-mode','hidden-ui'); setFsButtons(); clearTimeout(state.hideTimer); }
});
document.addEventListener('keydown', e => { if(e.key==='ArrowRight') nextChannel(); if(e.key==='ArrowLeft') prevChannel(); if(e.key.toLowerCase()==='f') toggleFullscreen(); if(e.key===' '){ e.preventDefault(); togglePlay(); } });
function showGesture(text){ gestureFeedback.textContent = text; gestureFeedback.classList.add('show'); clearTimeout(showGesture.t); showGesture.t = setTimeout(() => gestureFeedback.classList.remove('show'), 650); }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
videoStage.addEventListener('touchstart', e => {
  if(!isFullscreenLike()) return;
  if(e.target.closest('.fs-overlay')) return;
  const t = e.changedTouches[0];
  gestureStart = { x:t.clientX, y:t.clientY, brightness:brightnessLevel, volume:volumeLevel || 0 };
  clearTimeout(state.hideTimer);
}, {passive:true});
videoStage.addEventListener('touchmove', e => {
  if(!gestureStart || !isFullscreenLike()) return;
  if(e.target.closest('.fs-overlay')) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - gestureStart.x;
  const dy = t.clientY - gestureStart.y;
  if(Math.abs(dy) < 18 || Math.abs(dy) < Math.abs(dx)) return;
  const sideLeft = gestureStart.x < window.innerWidth / 2;
  const delta = -dy / Math.max(220, window.innerHeight * .45);
  if(sideLeft){
    setBrightnessLevel(gestureStart.brightness + delta);
    showGesture(`Brightness ${Math.round(brightnessLevel*100)}%`);
  } else {
    setVolumeLevel(gestureStart.volume + delta);
    showGesture(`Volume ${Math.round(volumeLevel*100)}%`);
  }
}, {passive:true});
videoStage.addEventListener('touchend', () => { gestureStart = null; if(isFullscreenLike()) showControlsTemporarily(); }, {passive:true});
['touchstart','touchmove','pointerdown','pointermove','wheel'].forEach(ev => {
  fsOverlay.addEventListener(ev, () => { if(isFullscreenLike()) showControlsTemporarily(); }, {passive:true});
});
if(screenDimmer) screenDimmer.style.opacity = '0';
document.addEventListener('visibilitychange', () => { if(!document.hidden && !isFullscreenLike()){ resetAndroidBrightness(); if(screenDimmer) screenDimmer.style.opacity='0'; } });
window.addEventListener('focus', () => { if(!isFullscreenLike()){ resetAndroidBrightness(); if(screenDimmer) screenDimmer.style.opacity='0'; } });
setVolumeLevel(1);
updateMuteUI();
setFsButtons();
</script>
</body>
</html>
